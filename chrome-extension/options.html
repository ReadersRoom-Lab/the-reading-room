<!DOCTYPE html>
<html>
<head>
  <title>Reading Room Extension Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; width: 300px; }
    h2 { font-size: 16px; margin-top: 0; }
    label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #1A1A1A; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
    button:hover { background: #333; }
    #status { margin-top: 12px; font-size: 13px; color: #16a34a; display: none; }
    .hint { font-size: 12px; color: #666; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>Extension Settings</h2>
  <label for="backendUrl">App URL</label>
  <div class="hint">Enter your deployed Reading Room URL (e.g. https://qwsz.vercel.app or http://localhost:3000)</div>
  <input type="text" id="backendUrl" placeholder="https://your-app.vercel.app">
  <button id="saveBtn">Save Settings</button>
  <div id="status">Settings saved!</div>
  <script src="options.js"></script>
</body>
</html>

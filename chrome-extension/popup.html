<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ReadrSpace</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">ReadrSpace</h1>
      <!-- Save View -->
      <div id="save-view" class="view-section">
        <p class="subtitle">Save this article to your library.</p>
        <div id="status-container" class="status hidden"></div>
        <button id="save-btn" class="btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Save to Library
        </button>
        <div id="connection-info" class="connection-info"></div>
      </div>

      <!-- Connect View -->
      <div id="connect-view" class="view-section hidden">
        <p class="subtitle">Connect this site to enable saving.</p>
        <div class="connect-box">
          <span id="connect-url" class="connect-url"></span>
        </div>
        <button id="connect-btn" class="btn btn-secondary">Connect Workspace</button>
      </div>

      <!-- No Connection View -->
      <div id="no-connection-view" class="view-section hidden">
        <p class="subtitle error-text">No connected workspace found.</p>
        <p class="info-text">
          To start saving, open your ReadrSpace dashboard (e.g. <code>localhost:3000</code> or
          your deployed website) and click this extension icon to connect.
        </p>
        <div class="help-link-container">
          <a id="help-link" href="#" class="help-link">View Setup Guide</a>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>

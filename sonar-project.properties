sonar.organization=readersroom-lab
sonar.projectKey=readersroom-lab_the-reading-room

# Source and test directories
sonar.sources=app,components,lib
sonar.tests=tests

# Coverage report generated by Node test runner with --experimental-test-coverage
sonar.javascript.lcov.reportPaths=lcov.info
sonar.typescript.lcov.reportPaths=lcov.info

# Exclude build artifacts, dependencies, and generated code
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,public/**,**/*.generated.*

# Exclude CSS, API routes, and components from copy-paste detection
sonar.cpd.exclusions=app/globals.css,**/*.css,app/api/**/*,components/**/*

# Exclude UI components, Next.js routes, and files requiring live external services from coverage
sonar.coverage.exclusions=app/**/*,components/**/*,lib/prisma.ts,lib/embeddings.ts

# Ignore dangerouslySetInnerHTML (S5147) - we sanitize in the backend with DOMPurify
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S5147
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx

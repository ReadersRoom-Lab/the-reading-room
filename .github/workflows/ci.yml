name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://the-reading-room-qwsz.vercel.app

      - name: Run Unit Tests
        run: npm test

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reading-room-extension
          path: public/extension.zip
          retention-days: 14

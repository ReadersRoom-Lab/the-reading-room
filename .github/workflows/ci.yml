name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by SonarCloud for blame info and new-code detection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Prettier Format Check
        run: npm run format:check

      - name: Security Audit (Vulnerabilities Scan)
        run: npm audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://the-reading-room-qwsz.vercel.app

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: true

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reading-room-extension
          path: public/extension.zip
          retention-days: 14

name: SonarCloud
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis accuracy

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          npx c8 --reporter=lcov --reporter=text --all --src lib --include "lib/**/*.ts" --exclude "lib/prisma.ts" --exclude "lib/embeddings.ts" node --import tsx --test 'tests/*.test.ts'
        continue-on-error: true # don't fail the build if tests fail; Sonar still needs the coverage file

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: true

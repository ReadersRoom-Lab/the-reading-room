name: SonarCloud
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis accuracy

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          node --import tsx \
            --experimental-test-coverage \
            --test-reporter=lcov \
            --test-reporter-destination=lcov.info \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            tests/*.test.ts
        continue-on-error: true   # don't fail the build if tests fail; Sonar still needs the coverage file

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

